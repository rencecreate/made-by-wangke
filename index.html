<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>RENCE CREATE | Art Studio</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@400;700;900&family=Fraunces:ital,opsz,wght@0,9..144,700;1,9..144,400&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg:            #f4f4f4;
            --black:         #000000;
            --accent:        #00ff66;
            --white:         #ffffff;
            --grey:          #e0e0e0;
            --text-muted:    #555555;
            --border:        3px solid var(--black);
            --shadow-sm:     6px 6px 0px var(--black);
            --shadow-lg:     12px 12px 0px var(--black);
            --shadow-accent: 8px 8px 0px var(--accent);
            --ease:          cubic-bezier(0.175, 0.885, 0.32, 1.275);
            --transition:    all 0.25s var(--ease);
        }

        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        html { scroll-behavior: smooth; }

        body {
            font-family: 'Unbounded', sans-serif;
            background: var(--bg);
            color: var(--black);
            overflow-x: hidden;
            line-height: 1.5;
        }

        .hidden { display: none !important; }

        /* ─── NAVBAR ─── */
        header {
            position: fixed;
            top: 16px;
            left: 16px;
            right: 16px;
            z-index: 500;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 28px;
            background: rgba(255,255,255,0.72);
            backdrop-filter: blur(18px);
            -webkit-backdrop-filter: blur(18px);
            border: var(--border);
            box-shadow: var(--shadow-sm);
            transition: transform 0.3s ease, opacity 0.3s ease;
        }

        header.headroom--hidden {
            transform: translateY(calc(-100% - 32px));
            opacity: 0;
            pointer-events: none;
        }

        .logo {
            font-family: 'Unbounded', sans-serif;
            font-weight: 900;
            font-size: 1.3rem;
            letter-spacing: -1.5px;
            color: var(--black);
            text-decoration: none;
        }

        .nav-links { display: flex; align-items: center; gap: 8px; }

        .nav-links a {
            font-family: 'Unbounded', sans-serif;
            font-weight: 900;
            font-size: 0.6rem;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            color: var(--black);
            text-decoration: none;
            padding: 8px 16px;
            border: 2px solid var(--black);
            background: var(--white);
            transition: var(--transition);
        }

        .nav-links a:hover {
            background: var(--black);
            color: var(--accent);
            transform: translate(-2px, -2px);
            box-shadow: 3px 3px 0px var(--accent);
        }

        /* ─── HERO SECTION ─── */
        .hero {
            width: 100%;
            min-height: 100vh;
            position: relative;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* The editable header image zone */
        .hero-bg {
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 55vh;
            background: var(--black);
            overflow: hidden;
            z-index: 0;
        }

        .hero-bg img {
            width: 100%; height: 100%;
            object-fit: cover;
            display: block;
        }

        .hero-bg-placeholder {
            width: 100%; height: 100%;
            background: linear-gradient(135deg, #0a0a0a 0%, #111 40%, #0f1a0a 100%);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .hero-bg-placeholder span {
            font-family: 'Fraunces', serif;
            font-style: italic;
            font-size: clamp(3rem, 10vw, 7rem);
            font-weight: 700;
            color: var(--accent);
            opacity: 0.07;
            letter-spacing: -3px;
        }

        /* Wavy bottom edge */
        .hero-wave {
            position: absolute;
            bottom: -2px;
            left: 0; right: 0;
            height: 80px;
            z-index: 2;
        }

        /* Hero content */
        .hero-content {
            position: relative;
            z-index: 3;
            max-width: 560px;
            margin: 0 auto;
            padding: 0 24px;
            padding-top: calc(55vh - 60px);
            padding-bottom: 48px;
            width: 100%;
        }

        .hero-greeting {
            font-family: 'Fraunces', serif;
            font-style: italic;
            font-weight: 400;
            font-size: clamp(0.75rem, 2vw, 0.95rem);
            color: var(--text-muted);
            margin-bottom: 4px;
            letter-spacing: 0.5px;
        }

        .hero-name {
            font-family: 'Unbounded', sans-serif;
            font-weight: 900;
            font-size: clamp(2.8rem, 10vw, 5rem);
            line-height: 0.9;
            letter-spacing: -3px;
            color: var(--black);
            margin-bottom: 8px;
        }

        .hero-tagline {
            font-family: 'Fraunces', serif;
            font-style: italic;
            font-size: clamp(0.8rem, 2vw, 1rem);
            color: var(--text-muted);
            margin-bottom: 28px;
        }

        /* Character/mascot image */
        .hero-character {
            position: absolute;
            right: max(5%, calc(50% - 280px + 20px));
            top: calc(55vh - 340px);
            width: clamp(160px, 36vw, 260px);
            z-index: 4;
            pointer-events: none;
        }

        .hero-character img {
            width: 100%;
            height: auto;
            display: block;
            filter: drop-shadow(0 8px 24px rgba(0,0,0,0.25));
        }

        /* Social buttons */
        .social-btns {
            display: flex;
            gap: 10px;
            margin-bottom: 40px;
            flex-wrap: wrap;
        }

        .social-btn {
            width: 48px;
            height: 48px;
            background: var(--black);
            border: 2px solid var(--black);
            display: flex;
            align-items: center;
            justify-content: center;
            text-decoration: none;
            transition: var(--transition);
            flex-shrink: 0;
        }

        .social-btn:hover {
            background: var(--accent);
            border-color: var(--black);
            transform: translate(-3px, -3px);
            box-shadow: 4px 4px 0px var(--black);
        }

        .social-btn svg {
            width: 20px;
            height: 20px;
            fill: var(--white);
            transition: fill 0.2s;
        }

        .social-btn:hover svg { fill: var(--black); }

        /* ─── SECTION LABELS ─── */
        .section-label {
            font-family: 'Unbounded', sans-serif;
            font-weight: 900;
            font-size: clamp(0.9rem, 2.5vw, 1.1rem);
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--black);
            margin-bottom: 16px;
            padding-left: 12px;
            border-left: 4px solid var(--accent);
        }

        /* ─── SECTIONS WRAPPER ─── */
        .sections-wrap {
            max-width: 560px;
            margin: 0 auto;
            padding: 0 24px 100px;
            display: flex;
            flex-direction: column;
            gap: 48px;
        }

        /* ─── THE BOARD (Carousel) ─── */
        .board-wrap {
            width: 100%;
        }

        .carousel {
            position: relative;
            width: 100%;
            aspect-ratio: 16 / 9;
            background: var(--black);
            border: var(--border);
            box-shadow: var(--shadow-sm);
            overflow: hidden;
        }

        .carousel-track {
            display: flex;
            width: 100%;
            height: 100%;
            transition: transform 0.5s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .carousel-slide {
            min-width: 100%;
            height: 100%;
            background: #111;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Fraunces', serif;
            font-style: italic;
            font-size: 1rem;
            color: rgba(255,255,255,0.2);
        }

        .carousel-slide img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        .carousel-btn {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            width: 36px;
            height: 36px;
            background: rgba(0,0,0,0.55);
            border: 2px solid rgba(255,255,255,0.3);
            color: var(--white);
            font-size: 1rem;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            z-index: 10;
            transition: var(--transition);
            backdrop-filter: blur(4px);
        }

        .carousel-btn:hover {
            background: var(--accent);
            border-color: var(--black);
            color: var(--black);
            box-shadow: 3px 3px 0 var(--black);
            transform: translateY(-50%) translate(-2px, -2px);
        }

        .carousel-btn.prev { left: 10px; }
        .carousel-btn.next { right: 10px; }

        .carousel-dots {
            display: flex;
            justify-content: center;
            gap: 6px;
            margin-top: 12px;
        }

        .carousel-dot {
            width: 8px;
            height: 8px;
            background: var(--grey);
            border: 1.5px solid var(--black);
            cursor: pointer;
            transition: background 0.2s;
        }

        .carousel-dot.active {
            background: var(--black);
        }

        /* ─── THE WALL (Reviews / Twitter Embeds) ─── */
        .wall-wrap { width: 100%; }

        .wall-feed {
            display: flex;
            flex-direction: column;
            gap: 16px;
            max-height: 600px;
            overflow-y: auto;
            padding-right: 4px;
        }

        .wall-feed::-webkit-scrollbar { width: 4px; }
        .wall-feed::-webkit-scrollbar-track { background: var(--grey); }
        .wall-feed::-webkit-scrollbar-thumb { background: var(--black); }

        .wall-tweet-wrap {
            border: var(--border);
            background: var(--white);
            box-shadow: 4px 4px 0 var(--black);
            overflow: hidden;
            min-height: 80px;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 8px;
        }

        .wall-empty {
            font-family: 'Fraunces', serif;
            font-style: italic;
            color: var(--text-muted);
            font-size: 0.9rem;
            text-align: center;
            padding: 40px 20px;
            border: 2px dashed var(--grey);
        }

        /* ─── FOOTER ─── */
        footer {
            background: var(--black);
            color: var(--white);
            padding: 32px 24px;
            text-align: center;
        }

        .footer-logo {
            font-family: 'Unbounded', sans-serif;
            font-weight: 900;
            font-size: 1.5rem;
            letter-spacing: -1.5px;
            color: var(--white);
            margin-bottom: 8px;
        }

        .footer-tagline {
            font-family: 'Fraunces', serif;
            font-style: italic;
            color: rgba(255,255,255,0.4);
            font-size: 0.8rem;
        }

        /* ─── TOAST ─── */
        #custom-alert {
            position: fixed;
            bottom: 32px; right: 24px;
            background: var(--black);
            color: var(--white);
            padding: 14px 22px;
            border: 2px solid var(--accent);
            display: flex; align-items: center; gap: 12px;
            font-size: 0.7rem; font-weight: 700;
            text-transform: uppercase; letter-spacing: 0.5px;
            transform: translateY(calc(100% + 60px));
            opacity: 0; pointer-events: none;
            transition: transform 0.45s var(--ease), opacity 0.45s ease;
            z-index: 9999;
            box-shadow: 5px 5px 0px var(--accent);
            max-width: 320px;
        }
        #custom-alert.show { transform: translateY(0); opacity: 1; pointer-events: auto; }

        /* ─── MOBILE ─── */
        @media (max-width: 767px) {
            html, body { -webkit-overflow-scrolling: touch; }

            header { top: 8px; left: 8px; right: 8px; padding: 10px 16px; }
            .logo { font-size: 1.1rem; }
            .nav-links a { padding: 7px 10px; font-size: 0.55rem; }

            .hero-character {
                right: -10px;
                top: calc(55vh - 280px);
                width: clamp(130px, 40vw, 200px);
                opacity: 0.9;
            }

            .hero-content { padding-top: calc(55vh - 40px); }

            .sections-wrap { gap: 36px; }

            .wall-feed { max-height: 480px; }

            #custom-alert { bottom: 16px; right: 12px; left: 12px; max-width: none; }
        }

        @media (max-width: 480px) {
            .hero-name { font-size: 2.5rem; letter-spacing: -2px; }
            .social-btn { width: 44px; height: 44px; }
        }
    </style>
</head>

<script>
    /* ─── SUPABASE ─── */
    const SUPABASE_URL = 'https://wogftjsssxfhktgdfvod.supabase.co';
    const SUPABASE_KEY = 'sb_publishable_9yJg8M-wrRXHMfuDnCtFkA_L3n1Ii36';
    const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    /* ─── TOAST ─── */
    let _notifyTimer = null;
    function notify(text, icon = "✨") {
        const box = document.getElementById('custom-alert');
        document.getElementById('alert-text').innerText = text;
        document.getElementById('alert-icon').innerText = icon;
        if (_notifyTimer) { clearTimeout(_notifyTimer); _notifyTimer = null; }
        box.classList.remove('show');
        void box.offsetWidth;
        box.classList.add('show');
        _notifyTimer = setTimeout(() => { box.classList.remove('show'); _notifyTimer = null; }, 3000);
    }

    /* ─── HEADROOM (hide nav on scroll down) ─── */
    let lastY = 0;
    window.addEventListener('scroll', () => {
        const y = window.scrollY;
        const header = document.getElementById('main-header');
        if (y > lastY && y > 80) header.classList.add('headroom--hidden');
        else header.classList.remove('headroom--hidden');
        lastY = y;
    }, { passive: true });

    /* ═══════════════════════════════════════════
       CAROUSEL
    ═══════════════════════════════════════════ */
    let slides = [];
    let currentSlide = 0;
    let autoplayTimer = null;
    let userInteracted = false;

    function buildCarousel(images) {
        const track = document.getElementById('carousel-track');
        const dotsWrap = document.getElementById('carousel-dots');
        track.innerHTML = '';
        dotsWrap.innerHTML = '';

        if (!images || images.length === 0) {
            track.innerHTML = '<div class="carousel-slide">No slides yet — add images via Admin Panel</div>';
            return;
        }

        slides = images;
        slides.forEach((src, i) => {
            const slide = document.createElement('div');
            slide.className = 'carousel-slide';
            const img = document.createElement('img');
            img.src = src;
            img.alt = `Slide ${i + 1}`;
            img.loading = 'lazy';
            slide.appendChild(img);
            track.appendChild(slide);

            const dot = document.createElement('button');
            dot.className = 'carousel-dot' + (i === 0 ? ' active' : '');
            dot.setAttribute('aria-label', `Slide ${i + 1}`);
            dot.addEventListener('click', () => { userInteracted = true; goTo(i); stopAutoplay(); });
            dotsWrap.appendChild(dot);
        });

        goTo(0);
        startAutoplay();
    }

    function goTo(idx) {
        currentSlide = (idx + slides.length) % slides.length;
        document.getElementById('carousel-track').style.transform = `translateX(-${currentSlide * 100}%)`;
        document.querySelectorAll('.carousel-dot').forEach((d, i) => {
            d.classList.toggle('active', i === currentSlide);
        });
    }

    function startAutoplay() {
        stopAutoplay();
        if (slides.length <= 1) return;
        autoplayTimer = setInterval(() => {
            if (!userInteracted) goTo(currentSlide + 1);
            else goTo(currentSlide + 1);
        }, 4000);
    }

    function stopAutoplay() {
        if (autoplayTimer) { clearInterval(autoplayTimer); autoplayTimer = null; }
    }

    document.getElementById('carousel-prev').addEventListener('click', () => {
        userInteracted = true; goTo(currentSlide - 1); stopAutoplay(); startAutoplay();
    });
    document.getElementById('carousel-next').addEventListener('click', () => {
        userInteracted = true; goTo(currentSlide + 1); stopAutoplay(); startAutoplay();
    });

    // Touch swipe
    let touchStartX = 0;
    const carousel = document.getElementById('carousel');
    carousel.addEventListener('touchstart', e => { touchStartX = e.touches[0].clientX; }, { passive: true });
    carousel.addEventListener('touchend', e => {
        const diff = touchStartX - e.changedTouches[0].clientX;
        if (Math.abs(diff) > 40) {
            userInteracted = true;
            if (diff > 0) goTo(currentSlide + 1);
            else goTo(currentSlide - 1);
            stopAutoplay(); startAutoplay();
        }
    }, { passive: true });

    /* ═══════════════════════════════════════════
       TWITTER WALL
    ═══════════════════════════════════════════ */
    function buildWall(tweetUrls) {
        const feed = document.getElementById('wall-feed');
        feed.innerHTML = '';

        if (!tweetUrls || tweetUrls.length === 0) {
            feed.innerHTML = '<div class="wall-empty">Reviews coming soon.</div>';
            return;
        }

        // Load Twitter widget script once
        if (!window.twttr) {
            const script = document.createElement('script');
            script.src = 'https://platform.twitter.com/widgets.js';
            script.async = true;
            document.head.appendChild(script);
        }

        tweetUrls.forEach(url => {
            if (!url) return;
            const wrap = document.createElement('div');
            wrap.className = 'wall-tweet-wrap';

            const tweetId = url.split('/').pop().split('?')[0];

            // Use Twitter oEmbed to render
            const blockquote = document.createElement('blockquote');
            blockquote.className = 'twitter-tweet';
            blockquote.setAttribute('data-conversation', 'none');
            const link = document.createElement('a');
            link.href = url;
            blockquote.appendChild(link);
            wrap.appendChild(blockquote);
            feed.appendChild(wrap);
        });

        // Re-render embedded tweets
        if (window.twttr && window.twttr.widgets) {
            window.twttr.widgets.load(feed);
        }
    }

    /* ═══════════════════════════════════════════
       LOAD DATA FROM SUPABASE
    ═══════════════════════════════════════════ */
    async function init() {
        try {
            const { data: settings } = await sb
                .from('front_page_settings')
                .select('*')
                .eq('id', 1)
                .single();

            if (settings) {
                // Hero background
                if (settings.hero_bg_url) {
                    const bgImg = document.getElementById('hero-bg-img');
                    bgImg.src = settings.hero_bg_url;
                    bgImg.classList.remove('hidden');
                    document.getElementById('hero-bg-placeholder').style.display = 'none';
                }

                // Character image
                if (settings.character_url) {
                    const charImg = document.getElementById('hero-character-img');
                    charImg.src = settings.character_url;
                    charImg.classList.remove('hidden');
                    document.getElementById('hero-character-placeholder').style.display = 'none';
                }

                // Social links
                if (settings.tiktok_url)    document.getElementById('link-tiktok').href    = settings.tiktok_url;
                if (settings.instagram_url) document.getElementById('link-instagram').href = settings.instagram_url;
                if (settings.facebook_url)  document.getElementById('link-facebook').href  = settings.facebook_url;
                if (settings.twitter_url)   document.getElementById('link-twitter').href   = settings.twitter_url;

                // Board images
                const boardImages = settings.board_images || [];
                buildCarousel(boardImages);

                // Wall tweets
                const wallLinks = settings.wall_tweet_urls || [];
                buildWall(wallLinks);
            }
        } catch (err) {
            console.error('Init error:', err);
        }
    }

    init();
</script>
