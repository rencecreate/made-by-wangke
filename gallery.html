<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>RENCE CREATE | Gallery</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@400;700;900&family=Fraunces:ital,opsz,wght@0,9..144,700;1,9..144,400&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg:            #f4f4f4;
            --black:         #000000;
            --accent:        #00ff66;
            --white:         #ffffff;
            --grey:          #e0e0e0;
            --text-muted:    #555555;
            --border:        3px solid var(--black);
            --shadow-sm:     6px 6px 0px var(--black);
            --ease:          cubic-bezier(0.175, 0.885, 0.32, 1.275);
            --transition:    all 0.25s var(--ease);
            --danger:        #e00000;
        }

        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Unbounded', sans-serif;
            background: var(--bg);
            color: var(--black);
            overflow-x: hidden;
            line-height: 1.5;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        .hidden { display: none !important; }

        /* ─── NAVBAR ─── */
        header {
            position: fixed;
            top: 16px; left: 16px; right: 16px;
            z-index: 500;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 28px;
            background: rgba(255,255,255,0.72);
            backdrop-filter: blur(18px);
            -webkit-backdrop-filter: blur(18px);
            border: var(--border);
            box-shadow: var(--shadow-sm);
            transition: transform 0.3s ease, opacity 0.3s ease;
        }

        header.headroom--hidden {
            transform: translateY(calc(-100% - 32px));
            opacity: 0;
            pointer-events: none;
        }

        .logo {
            font-family: 'Unbounded', sans-serif;
            font-weight: 900;
            font-size: 1.3rem;
            letter-spacing: -1.5px;
            color: var(--black);
            text-decoration: none;
        }

        .nav-links { display: flex; align-items: center; gap: 8px; }

        .nav-links a {
            font-family: 'Unbounded', sans-serif;
            font-weight: 900;
            font-size: 0.6rem;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            color: var(--black);
            text-decoration: none;
            padding: 8px 16px;
            border: 2px solid var(--black);
            background: var(--white);
            transition: var(--transition);
        }

        .nav-links a:hover, .nav-links a.active {
            background: var(--black);
            color: var(--accent);
            transform: translate(-2px, -2px);
            box-shadow: 3px 3px 0px var(--accent);
        }

        /* ─── HERO HEADER ─── */
        .gallery-hero {
            width: 100%;
            min-height: 260px;
            background: var(--black);
            position: relative;
            display: flex;
            align-items: flex-end;
            overflow: hidden;
            padding-top: 100px;
        }

        .gallery-hero-bg {
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg, #0a0a0a 0%, #111 50%, #050a05 100%);
        }

        .gallery-hero-bg img {
            width: 100%; height: 100%;
            object-fit: cover;
            opacity: 0.3;
        }

        /* Wave bottom */
        .gallery-hero-wave {
            position: absolute;
            bottom: -2px; left: 0; right: 0;
            height: 60px;
            z-index: 2;
        }

        .gallery-hero-content {
            position: relative;
            z-index: 3;
            max-width: 900px;
            width: 100%;
            margin: 0 auto;
            padding: 32px 28px 64px;
            text-align: center;
        }

        .gallery-title {
            font-family: 'Unbounded', sans-serif;
            font-weight: 900;
            font-size: clamp(2rem, 8vw, 4.5rem);
            letter-spacing: -3px;
            line-height: 1;
            margin-bottom: 4px;
        }

        .gallery-title span {
            font-family: 'Fraunces', serif;
            font-style: italic;
            font-weight: 700;
            color: var(--accent);
        }

        .gallery-title strong {
            color: var(--white);
        }

        /* ─── CATEGORY FILTER BAR ─── */
        .cat-bar-wrap {
            position: sticky;
            top: 72px;
            z-index: 200;
            background: var(--bg);
            border-bottom: 2px solid var(--black);
            padding: 0 24px;
            overflow-x: auto;
            -webkit-overflow-scrolling: touch;
            scrollbar-width: none;
        }

        .cat-bar-wrap::-webkit-scrollbar { display: none; }

        .cat-bar {
            display: flex;
            gap: 0;
            min-width: max-content;
            margin: 0 auto;
            max-width: 900px;
        }

        .cat-btn {
            font-family: 'Unbounded', sans-serif;
            font-weight: 900;
            font-size: 0.58rem;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            color: var(--text-muted);
            background: transparent;
            border: none;
            border-right: 1px solid var(--grey);
            padding: 14px 20px;
            cursor: pointer;
            white-space: nowrap;
            transition: color 0.2s, background 0.2s;
        }

        .cat-btn:first-child { border-left: none; }
        .cat-btn:last-child  { border-right: none; }

        .cat-btn:hover { color: var(--black); background: rgba(0,0,0,0.04); }

        .cat-btn.active {
            color: var(--black);
            background: var(--black);
            color: var(--accent);
        }

        /* ─── GALLERY GRID ─── */
        .gallery-main {
            flex: 1;
            max-width: 900px;
            width: 100%;
            margin: 0 auto;
            padding: 32px 24px 80px;
        }

        .gallery-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 12px;
        }

        .gallery-cell {
            position: relative;
            aspect-ratio: 1 / 1;
            background: var(--grey);
            overflow: hidden;
            cursor: pointer;
            border: 2px solid transparent;
            transition: border-color 0.2s, transform 0.2s, box-shadow 0.2s;
        }

        .gallery-cell:hover {
            border-color: var(--black);
            transform: translate(-2px, -2px);
            box-shadow: 4px 4px 0px var(--black);
        }

        .gallery-cell img {
            width: 100%; height: 100%;
            object-fit: cover;
            display: block;
            transition: transform 0.4s ease;
        }

        .gallery-cell:hover img {
            transform: scale(1.04);
        }

        /* Hover overlay — rises from bottom */
        .gallery-cell-overlay {
            position: absolute;
            bottom: 0; left: 0; right: 0;
            background: linear-gradient(to top, rgba(0,0,0,0.88) 0%, rgba(0,0,0,0.4) 60%, transparent 100%);
            padding: 16px 12px 12px;
            transform: translateY(100%);
            transition: transform 0.35s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .gallery-cell:hover .gallery-cell-overlay,
        .gallery-cell.touch-active .gallery-cell-overlay {
            transform: translateY(0);
        }

        .cell-title {
            font-family: 'Unbounded', sans-serif;
            font-weight: 900;
            font-size: 0.65rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: var(--white);
            margin-bottom: 4px;
            line-height: 1.3;
        }

        .cell-desc {
            font-family: 'Fraunces', serif;
            font-style: italic;
            font-size: 0.7rem;
            color: rgba(255,255,255,0.7);
            line-height: 1.4;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        /* Admin delete button on cell */
        .cell-del-btn {
            position: absolute;
            top: 6px; right: 6px;
            width: 26px; height: 26px;
            background: var(--black);
            color: var(--accent);
            border: none;
            font-size: 0.7rem;
            font-weight: 900;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 10;
            opacity: 0;
            transition: opacity 0.2s;
            padding: 0;
        }

        .gallery-cell:hover .cell-del-btn { opacity: 1; }

        .gallery-cell:hover .cell-del-btn:hover {
            background: var(--danger);
            color: var(--white);
        }

        .gallery-empty {
            grid-column: 1 / -1;
            text-align: center;
            padding: 80px 20px;
            font-family: 'Fraunces', serif;
            font-style: italic;
            color: var(--text-muted);
            font-size: 1.1rem;
        }

        /* ─── FOOTER ─── */
        footer {
            background: var(--black);
            color: var(--white);
            padding: 32px 24px;
            text-align: center;
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .footer-logo {
            font-family: 'Unbounded', sans-serif;
            font-weight: 900;
            font-size: 1.4rem;
            letter-spacing: -1.5px;
        }

        .footer-copy {
            font-family: 'Unbounded', sans-serif;
            font-size: 0.55rem;
            font-weight: 400;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: rgba(255,255,255,0.35);
            line-height: 2;
        }

        /* ─── TOAST ─── */
        #g-alert {
            position: fixed; bottom: 32px; right: 24px;
            background: var(--black); color: var(--white);
            padding: 14px 22px; border: 2px solid var(--accent);
            display: flex; align-items: center; gap: 12px;
            font-size: 0.7rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px;
            transform: translateY(calc(100% + 60px)); opacity: 0; pointer-events: none;
            transition: transform 0.45s var(--ease), opacity 0.45s ease;
            z-index: 9999; box-shadow: 5px 5px 0 var(--accent); max-width: 320px;
        }
        #g-alert.show { transform: translateY(0); opacity: 1; pointer-events: auto; }

        /* ─── MOBILE TAB BAR ─── */
        #mobile-tab-bar { display: none; }

        /* ─── MOBILE ─── */
        @media (max-width: 767px) {
            :root {
                --tab-h: 60px;
                --tab-safe: max(env(safe-area-inset-bottom, 0px), 8px);
                --tab-tot: calc(var(--tab-h) + var(--tab-safe));
            }

            html, body { -webkit-overflow-scrolling: touch; }

            body { padding-bottom: var(--tab-tot); }

            header { top: 8px; left: 8px; right: 8px; padding: 10px 16px; }
            .logo { font-size: 1rem; }
            .nav-links { display: none; }

            .gallery-hero { padding-top: 80px; min-height: 200px; }

            .cat-bar-wrap { top: 58px; padding: 0 12px; }
            .cat-btn { padding: 12px 14px; font-size: 0.52rem; }

            .gallery-main { padding: 20px 12px var(--tab-tot); }
            .gallery-grid {
                grid-template-columns: repeat(2, 1fr);
                gap: 8px;
            }

            /* On mobile, overlay is always slightly visible */
            .gallery-cell-overlay {
                transform: translateY(70%);
            }

            #mobile-tab-bar {
                display: flex !important;
                position: fixed;
                bottom: 0; left: 0; right: 0;
                z-index: 900;
                height: var(--tab-tot);
                padding-bottom: var(--tab-safe);
                background: var(--white);
                border-top: 3px solid var(--black);
                overflow: hidden;
            }

            .tab-item {
                flex: 1;
                display: flex;
                flex-direction: column;
                align-items: center;
                justify-content: center;
                gap: 3px;
                text-decoration: none;
                color: var(--text-muted);
                font-family: 'Unbounded', sans-serif;
                font-size: 0.45rem;
                font-weight: 900;
                text-transform: uppercase;
                letter-spacing: 0.5px;
                transition: color 0.15s, background 0.15s;
                border-right: 1px solid var(--grey);
                padding-bottom: var(--tab-safe);
            }

            .tab-item:last-child { border-right: none; }
            .tab-item.active { color: var(--black); background: var(--accent); }

            .tab-icon { font-size: 1rem; line-height: 1; }
            .tab-label { font-size: 0.42rem; }

            #g-alert { bottom: calc(var(--tab-tot) + 12px); right: 12px; left: 12px; max-width: none; }
        }

        @media (max-width: 480px) {
            .gallery-grid { grid-template-columns: repeat(2, 1fr); gap: 6px; }
            .cell-title { font-size: 0.55rem; }
        }
    </style>
</head>
<body>

<!-- Toast -->
<div id="g-alert">
    <span id="g-alert-icon">✨</span>
    <span id="g-alert-text">Done</span>
</div>

<!-- NAVBAR -->
<header id="main-header">
    <a href="index.html" class="logo">RENCE CREATE</a>
    <nav class="nav-links">
        <a href="gallery.html" class="active">Gallery</a>
        <a href="main-shop.html">Shop</a>
        <a href="index.html">Home</a>
    </nav>
</header>

<!-- GALLERY HERO -->
<div class="gallery-hero">
    <div class="gallery-hero-bg">
        <img id="gallery-hero-bg-img" src="" alt="" class="hidden">
    </div>
    <div class="gallery-hero-content">
        <div class="gallery-title">
            <span>The</span> <strong>Gallery</strong>
        </div>
    </div>
    <svg class="gallery-hero-wave" viewBox="0 0 1440 60" preserveAspectRatio="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M0,30 C480,60 960,0 1440,30 L1440,60 L0,60 Z" fill="#f4f4f4"/>
    </svg>
</div>

<!-- CATEGORY FILTER BAR -->
<div class="cat-bar-wrap">
    <div class="cat-bar" id="cat-bar">
        <button class="cat-btn active" data-cat="All" onclick="filterByCategory('All', this)">All</button>
        <!-- Categories injected by JS -->
    </div>
</div>

<!-- GALLERY GRID -->
<main class="gallery-main">
    <div class="gallery-grid" id="gallery-grid">
        <!-- Cells injected by JS -->
        <div class="gallery-empty" id="gallery-loading">Loading...</div>
    </div>
</main>

<!-- FOOTER -->
<footer>
    <div class="footer-logo">RENCE CREATE</div>
    <div class="footer-copy">
        DESIGNED BY RENCE CREATE ·
        © ALL RIGHTS RESERVED 2026 ·
        AUTHENTIC QUALITY
    </div>
</footer>

<!-- MOBILE TAB BAR -->
<nav id="mobile-tab-bar" aria-label="Main navigation">
    <a href="main-shop.html" class="tab-item" aria-label="Shop">
        <span class="tab-icon">◈</span>
        <span class="tab-label">Shop</span>
    </a>
    <a href="gallery.html" class="tab-item active" aria-label="Gallery">
        <span class="tab-icon">✦</span>
        <span class="tab-label">Gallery</span>
    </a>
    <a href="index.html" class="tab-item" aria-label="Home">
        <span class="tab-icon">◎</span>
        <span class="tab-label">Home</span>
    </a>
</nav>


<script>
    /* ─── SUPABASE ─── */
    const SUPABASE_URL = 'https://wogftjsssxfhktgdfvod.supabase.co';
    const SUPABASE_KEY = 'sb_publishable_9yJg8M-wrRXHMfuDnCtFkA_L3n1Ii36';
    const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
    const BUCKET = 'gallery-images';

    let posts = [];
    let currentCategory = 'All';
    let _alertTimer = null;

    /* ─── HEADROOM ─── */
    let lastY = 0;
    window.addEventListener('scroll', () => {
        const y = window.scrollY;
        const header = document.getElementById('main-header');
        if (y > lastY && y > 80) header.classList.add('headroom--hidden');
        else header.classList.remove('headroom--hidden');
        lastY = y;
    }, { passive: true });

    /* ─── TOAST ─── */
    function notify(text, icon = '✨') {
        const box = document.getElementById('g-alert');
        document.getElementById('g-alert-text').innerText = text;
        document.getElementById('g-alert-icon').innerText = icon;
        if (_alertTimer) { clearTimeout(_alertTimer); _alertTimer = null; }
        box.classList.remove('show'); void box.offsetWidth; box.classList.add('show');
        _alertTimer = setTimeout(() => { box.classList.remove('show'); _alertTimer = null; }, 3000);
    }

    const isAdmin = localStorage.getItem('rc_is_admin') === '1';

    /* ─── CATEGORY FILTER ─── */
    function filterByCategory(cat, btn) {
        currentCategory = cat;
        document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
        if (btn) btn.classList.add('active');
        renderGrid();
    }

    function buildCategoryBar(posts) {
        const cats = [...new Set(posts.map(p => p.category).filter(Boolean))].sort();
        const bar = document.getElementById('cat-bar');
        // Remove all non-'All' buttons
        bar.querySelectorAll('[data-cat]:not([data-cat="All"])').forEach(b => b.remove());
        cats.forEach(cat => {
            const btn = document.createElement('button');
            btn.className = 'cat-btn';
            btn.dataset.cat = cat;
            btn.textContent = cat;
            btn.onclick = () => filterByCategory(cat, btn);
            bar.appendChild(btn);
        });
    }

    /* ─── RENDER GRID ─── */
    function renderGrid() {
        const grid = document.getElementById('gallery-grid');
        grid.innerHTML = '';

        const filtered = currentCategory === 'All'
            ? posts
            : posts.filter(p => p.category === currentCategory);

        if (filtered.length === 0) {
            grid.innerHTML = `<div class="gallery-empty">${posts.length === 0 ? 'No posts yet — check back soon.' : 'Nothing in this category yet.'}</div>`;
            return;
        }

        filtered.forEach(post => {
            const cell = document.createElement('div');
            cell.className = 'gallery-cell';

            cell.innerHTML = `
                <img src="${post.image_url}" alt="${post.title}" loading="lazy">
                <div class="gallery-cell-overlay">
                    <div class="cell-title">${post.title || ''}</div>
                    ${post.short_description ? `<div class="cell-desc">${post.short_description}</div>` : ''}
                </div>
                ${isAdmin ? `<button class="cell-del-btn" onclick="deletePost(event,'${post.id}','${post.image_url}')">✕</button>` : ''}
            `;

            // Touch: toggle overlay on tap
            cell.addEventListener('touchstart', () => {
                document.querySelectorAll('.gallery-cell.touch-active').forEach(c => {
                    if (c !== cell) c.classList.remove('touch-active');
                });
                cell.classList.toggle('touch-active');
            }, { passive: true });

            grid.appendChild(cell);
        });
    }

    /* ─── DELETE POST (admin only) ─── */
    async function deletePost(event, postId, imageUrl) {
        event.stopPropagation();
        if (!confirm('Delete this post? This cannot be undone.')) return;

        const { error: dbErr } = await sb.from('gallery_posts').delete().eq('id', postId);
        if (dbErr) { notify('Delete failed: ' + dbErr.message, '❌'); return; }

        try {
            const pathStart = imageUrl.indexOf(`/${BUCKET}/`) + `/${BUCKET}/`.length;
            await sb.storage.from(BUCKET).remove([imageUrl.substring(pathStart)]);
        } catch(e) { console.warn('Could not delete storage file:', e); }

        posts = posts.filter(p => String(p.id) !== String(postId));
        buildCategoryBar(posts);
        renderGrid();
        notify('Post deleted.', '🗑️');
    }

    /* ─── INIT ─── */
    async function init() {
        // Load gallery hero background from front_page_settings if desired
        // (reuses same hero_bg_url as homepage — change key if separate needed)

        const { data, error } = await sb
            .from('gallery_posts')
            .select('*')
            .order('created_at', { ascending: false });

        document.getElementById('gallery-loading').remove();

        if (error) {
            const grid = document.getElementById('gallery-grid');
            grid.innerHTML = '<div class="gallery-empty">Could not load gallery. Please try again.</div>';
            console.error(error);
            return;
        }

        posts = data || [];
        buildCategoryBar(posts);
        renderGrid();
    }

    init();
</script>
</body>
</html>
