<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>The Gallery</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@400;700;900&family=Fraunces:ital,opsz,wght@0,9..144,700;1,9..144,400&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg:#f4f4f4; --black:#000000; --accent:#00ff66; --white:#ffffff;
            --grey:#e0e0e0; --text-muted:#555555;
            --border:3px solid var(--black);
            --shadow-sm:6px 6px 0px var(--black); --shadow-lg:12px 12px 0px var(--black);
            --ease:cubic-bezier(0.175,0.885,0.32,1.275);
            --transition:all 0.25s var(--ease);
            --danger:#e00000;
        }
        *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
        body{font-family:'Unbounded',sans-serif;background:var(--bg);color:var(--black);overflow-x:hidden;line-height:1.5;padding-top:80px;padding-bottom:60px;}
        .hidden{display:none!important;}
        h1,h2,h3,.serif{font-family:'Fraunces',serif;font-style:italic;font-weight:400;}

        /* HEADER */
        header{position:fixed;top:16px;left:16px;right:16px;z-index:500;display:flex;justify-content:space-between;align-items:center;padding:12px 28px;background:rgba(255,255,255,0.72);backdrop-filter:blur(18px);-webkit-backdrop-filter:blur(18px);border:var(--border);box-shadow:var(--shadow-sm);transition:transform 0.3s ease-in-out,opacity 0.3s ease-in-out;will-change:transform,opacity;}
        header.headroom--hidden{transform:translateY(calc(-100% - 32px));opacity:0;pointer-events:none;}
        .logo{font-family:'Unbounded',sans-serif;font-weight:900;font-size:1.3rem;letter-spacing:-1.5px;color:var(--black);text-decoration:none;display:flex;align-items:center;}
        .header-nav{display:flex;align-items:center;gap:8px;}
        .nav-btn{font-family:'Unbounded',sans-serif;font-weight:900;font-size:0.65rem;text-transform:uppercase;letter-spacing:1px;background:var(--black);color:var(--white);border:none;padding:10px 20px;cursor:pointer;transition:var(--transition);white-space:nowrap;text-decoration:none;display:inline-block;}
        .nav-btn:hover{background:var(--accent);color:var(--black);transform:translateY(-3px);box-shadow:4px 4px 0px var(--black);}
        .nav-btn.active{background:var(--accent);color:var(--black);}

        button{font-family:'Unbounded',sans-serif;font-weight:900;font-size:0.7rem;text-transform:uppercase;letter-spacing:0.5px;background:var(--black);color:var(--white);border:none;padding:12px 22px;cursor:pointer;transition:var(--transition);}
        button:hover{background:var(--accent);color:var(--black);transform:translate(-2px,-2px);box-shadow:4px 4px 0px var(--black);}
        button.btn-danger{background:var(--danger);color:var(--white);}

        /* PAGE TITLE BANNER */
        .page-title-banner{text-align:center;padding:40px 24px 0;max-width:1300px;margin:0 auto;}
        .page-title-banner .title-eyebrow{font-family:'Unbounded',sans-serif;font-size:0.58rem;font-weight:700;text-transform:uppercase;letter-spacing:3px;color:var(--text-muted);margin-bottom:6px;}
        .page-title-banner .title-main{font-family:'Fraunces',serif;font-style:italic;font-size:clamp(2rem,6vw,3.2rem);font-weight:700;line-height:1.05;color:var(--black);}

        /* CATEGORY NAV */
        .category-section{max-width:1300px;margin:0 auto;padding:56px 24px 24px;text-align:center;}
        .folder-nav{display:flex;justify-content:center;flex-wrap:wrap;gap:32px;margin-bottom:28px;overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none;}
        .folder-nav::-webkit-scrollbar{display:none;}
        .folder-link{font-family:'Unbounded',sans-serif;font-weight:900;font-size:1rem;text-transform:uppercase;letter-spacing:1px;cursor:pointer;position:relative;padding-bottom:6px;transition:var(--transition);user-select:none;background:none;border:none;color:var(--black);}
        .folder-link::after{content:'';position:absolute;bottom:0;left:0;width:0;height:4px;background:var(--accent);transition:width 0.3s var(--ease);}
        .folder-link:hover::after,.folder-link.active::after{width:100%;}
        .folder-link:hover{background:none;color:var(--black);transform:none;box-shadow:none;}

        /* GALLERY GRID */
        .gallery-container{max-width:1300px;margin:0 auto;padding:40px 24px;}
        /* JS masonry — grid is position:relative, cards are absolute */
        .gallery-grid{position:relative;width:100%;}
        .gallery-grid .photo-card{position:absolute;width:0;}/* width set by JS */
        .gallery-empty{column-span:all;text-align:center;padding:80px 20px;}

        /* PHOTO CARD — flat, seamless, no border */
        .photo-card{position:relative;background:transparent;padding:0;cursor:pointer;overflow:hidden;transition:transform 0.25s var(--ease),box-shadow 0.25s var(--ease);display:block;}
        .photo-card:hover{transform:translate(-6px,-6px);box-shadow:8px 8px 0px rgba(0,0,0,0.15);}

        /* No aspect-ratio enforcement — card height = image natural height */
        .photo-card .photo-img{width:100%;height:auto;display:block;transition:transform 0.4s ease;}
        .photo-card:hover .photo-img{transform:scale(1.04);}

        /* Hover overlay rises from bottom */
        .photo-overlay{position:absolute;bottom:0;left:0;right:0;background:linear-gradient(to top,rgba(0,0,0,0.88) 0%,rgba(0,0,0,0.4) 60%,transparent 100%);padding:20px 16px 14px;transform:translateY(100%);transition:transform 0.35s cubic-bezier(0.4,0,0.2,1);}
        .photo-card:hover .photo-overlay,.photo-card.touch-active .photo-overlay{transform:translateY(0);}

        .overlay-title{font-family:'Unbounded',sans-serif;font-weight:900;font-size:0.7rem;text-transform:uppercase;letter-spacing:0.5px;color:var(--white);margin-bottom:4px;line-height:1.3;}
        .overlay-medium{font-family:'Fraunces',serif;font-style:italic;font-size:0.75rem;color:rgba(255,255,255,0.85);line-height:1.4;margin-bottom:2px;}
        .overlay-tools{font-family:'Fraunces',serif;font-style:italic;font-size:0.7rem;color:rgba(255,255,255,0.65);line-height:1.4;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;}

        /* Admin delete button */
        .photo-del-btn{position:absolute;top:8px;right:8px;width:28px;height:28px;background:var(--black);color:var(--accent);border:none;font-size:0.75rem;font-weight:900;cursor:pointer;display:flex;align-items:center;justify-content:center;z-index:10;opacity:0;transition:opacity 0.2s;padding:0;}
        .photo-card:hover .photo-del-btn{opacity:1;}
        .photo-card.touch-active .photo-del-btn{opacity:0!important;pointer-events:none!important;}
        .photo-del-btn:hover{background:var(--danger);color:var(--white);transform:none;box-shadow:none;}

        .gallery-empty{grid-column:1/-1;text-align:center;padding:80px 20px;}
        .gallery-empty h2{font-family:'Fraunces',serif;font-style:italic;font-size:2.5rem;margin-bottom:12px;}
        .gallery-empty p{font-size:0.7rem;color:var(--text-muted);text-transform:uppercase;letter-spacing:1.5px;}

        /* TOAST */
        #g-alert{position:fixed;bottom:32px;right:24px;background:var(--black);color:var(--white);padding:14px 22px;border:2px solid var(--accent);display:flex;align-items:center;gap:12px;font-size:0.7rem;font-weight:700;text-transform:uppercase;letter-spacing:0.5px;transform:translateY(calc(100% + 60px));opacity:0;pointer-events:none;transition:transform 0.45s var(--ease),opacity 0.45s ease;z-index:9999;box-shadow:5px 5px 0px var(--accent);max-width:320px;}
        #g-alert.show{transform:translateY(0);opacity:1;pointer-events:auto;}

        /* FOOTER */
        footer{background:var(--black);color:var(--white);padding:40px;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:20px;}
        .est-tag{font-family:'Unbounded',sans-serif;font-weight:900;font-size:clamp(1rem,4vw,1.5rem);line-height:1.3;}
        .footer-copy{text-align:right;font-size:0.6rem;opacity:0.5;line-height:2;font-weight:400;letter-spacing:1px;}

        /* MOBILE TAB BAR */
        #mobile-tab-bar{display:none;}

        @media(max-width:767px){
            :root{--tab-h:64px;--tab-safe:max(env(safe-area-inset-bottom,0px),8px);--tab-tot:calc(var(--tab-h) + var(--tab-safe));}
            html,body{-webkit-overflow-scrolling:touch;}
            *,*::before,*::after{box-sizing:border-box;}
            body{padding-top:80px!important;padding-bottom:20px!important;}
            a,button,[role="button"],.folder-link,.photo-card{-webkit-touch-callout:none;-webkit-tap-highlight-color:rgba(0,255,102,0.18);}
            /* Mobile header — visible, logo centered, no nav buttons */
            header{display:flex!important;justify-content:center;padding:10px 20px;top:10px;left:10px;right:10px;}
            .header-nav{display:none!important;}
            .logo{font-size:1.1rem;}
            .logo img{height:28px!important;}
            #mobile-tab-bar{display:none!important;}

            .photo-card:hover{transform:none;box-shadow:none;}
            .photo-card:active{transform:translate(-4px,-4px);box-shadow:6px 6px 0px var(--black);transition:transform 0.1s ease;}
            .photo-del-btn{display:none!important;}
            button:hover{transform:none;box-shadow:none;}
            button:active{transform:translate(-2px,-2px);box-shadow:3px 3px 0px var(--accent);background:var(--accent);color:var(--black);}
            .folder-link:hover::after{width:0;}
            .folder-link.active::after,.folder-link:active::after{width:100%;}

            /* Mobile overlay fully hidden until tapped */
            .photo-overlay{transform:translateY(110%);}
            .photo-card.touch-active .photo-overlay{transform:translateY(0);}

            button,a,[role="button"],.folder-link,.nav-btn{min-height:44px;}

            .page-title-banner{padding:20px 16px 0;}
            .page-title-banner .title-main{font-size:clamp(1.8rem,8vw,2.6rem);}

            .category-section{padding:16px 0 6px;overflow:hidden;}
            .folder-nav{flex-wrap:nowrap;overflow-x:auto;justify-content:flex-start;gap:28px;padding:4px 20px 10px;margin-bottom:8px;scrollbar-width:none;-webkit-mask-image:linear-gradient(to right,black 85%,transparent 100%);mask-image:linear-gradient(to right,black 85%,transparent 100%);}
            .folder-nav::-webkit-scrollbar{display:none;}
            .folder-link{font-size:0.85rem;flex-shrink:0;white-space:nowrap;padding:10px 4px;}

            .gallery-container{padding:12px 12px 40px;}

            #g-alert{bottom:20px;right:12px;left:12px;max-width:none;}
        }

        @media(max-width:374px){
            .folder-link{font-size:0.72rem;}
        }
    </style>
</head>
<body>

<div id="g-alert"><span id="g-alert-icon">✨</span><span id="g-alert-text">Done</span></div>

<header id="main-header">
    <a href="index.html" class="logo">
        <img id="nav-logo-img" src="" alt="RENCE CREATE" class="hidden" style="height:36px;width:auto;object-fit:contain;display:block;">
        <span id="nav-logo-text">RENCE CREATE</span>
    </a>
    <nav class="header-nav">
        <a href="gallery.html" class="nav-btn active">Gallery</a>
        <a href="main-shop.html" class="nav-btn">Shop</a>

</header>

<div class="page-title-banner">

</div>

<div class="category-section">
    <div class="folder-nav" id="folder-nav"></div>
</div>

    <div class="gallery-grid" id="gallery-grid">
        <div class="gallery-empty" id="gallery-loading"><p>Loading...</p></div>
    </div>
</div>

<footer>
    <div class="est-tag">EST. 2026<br>BATANGAS. PH</div>
    <div class="footer-copy">DESIGNED BY WANGKE<br>© ALL RIGHTS RESERVED 2026<br>AUTHENTIC QUALITY</div>
</footer>

    <a href="main-shop.html" class="tab-item" aria-label="Shop"><span class="tab-icon">◈</span><span class="tab-label">Shop</span></a>

<script>
    const SUPABASE_URL='https://wogftjsssxfhktgdfvod.supabase.co';
    const SUPABASE_KEY='sb_publishable_9yJg8M-wrRXHMfuDnCtFkA_L3n1Ii36';
    const sb=supabase.createClient(SUPABASE_URL,SUPABASE_KEY);
    const BUCKET='gallery-images';
    let posts=[],currentCategory='All',_alertTimer=null;
    const isAdmin=localStorage.getItem('rc_is_admin')==='1';

    (async function loadLogo(){try{const{data}=await sb.from('front_page_settings').select('logo_url').eq('id',1).single();if(data&&data.logo_url){const img=document.getElementById('nav-logo-img'),txt=document.getElementById('nav-logo-text');img.src=data.logo_url;img.classList.remove('hidden');if(txt)txt.style.display='none';}}catch(e){}})();

    function notify(text,icon='✨'){const box=document.getElementById('g-alert');document.getElementById('g-alert-text').innerText=text;document.getElementById('g-alert-icon').innerText=icon;if(_alertTimer){clearTimeout(_alertTimer);_alertTimer=null;}box.classList.remove('show');void box.offsetWidth;box.classList.add('show');_alertTimer=setTimeout(()=>{box.classList.remove('show');_alertTimer=null;},3000);}

    function buildCategoryNav(posts){const nav=document.getElementById('folder-nav');nav.innerHTML='';const cats=['All',...[...new Set(posts.map(p=>p.category).filter(Boolean))].sort()];cats.forEach(cat=>{const btn=document.createElement('button');btn.className=`folder-link${currentCategory===cat?' active':''}`;btn.textContent=cat;btn.onclick=()=>{currentCategory=cat;document.querySelectorAll('.folder-link').forEach(b=>b.classList.remove('active'));btn.classList.add('active');renderGrid();};nav.appendChild(btn);});}

    /* ── MASONRY ENGINE ─────────────────────────────────────────────────────
       Places each card into the shortest column at the time of placement.
       Order is preserved (newest → oldest left-to-right across cols).
       Re-runs on window resize via debounce.
    ──────────────────────────────────────────────────────────────────────── */
    const GAP = 14; // px between cards — overridden to 8px on mobile

    function getGap() {
        return window.innerWidth < 768 ? 8 : GAP;
    }

    function getColCount() {
        const w = document.getElementById('gallery-grid').offsetWidth;
        if (w < 480) return 2;
        if (w < 768) return 2;
        if (w < 1100) return 3;
        return 4;
    }

    function layoutMasonry() {
        const grid = document.getElementById('gallery-grid');
        const cards = Array.from(grid.querySelectorAll('.photo-card'));
        if (!cards.length) return;

        const totalW = grid.offsetWidth;
        const cols = getColCount();
        const gap = getGap();
        const colW = (totalW - gap * (cols - 1)) / cols;
        const colHeights = new Array(cols).fill(0);

        cards.forEach(card => {
            card.style.width = colW + 'px';
            // Find shortest column
            const minH = Math.min(...colHeights);
            const col = colHeights.indexOf(minH);
            const x = col * (colW + gap);
            const y = minH === 0 ? 0 : minH + gap;
            card.style.left = x + 'px';
            card.style.top  = y + 'px';
            colHeights[col] = y + card.offsetHeight;
        });

        grid.style.height = Math.max(...colHeights) + 'px';
    }

    // Re-layout after all images in a batch have loaded
    function layoutAfterImages(cards) {
        let loaded = 0;
        const imgs = cards.map(c => c.querySelector('img')).filter(Boolean);
        if (!imgs.length) { layoutMasonry(); return; }
        imgs.forEach(img => {
            if (img.complete) { if (++loaded === imgs.length) layoutMasonry(); return; }
            img.addEventListener('load',  () => { if (++loaded === imgs.length) layoutMasonry(); }, { once: true });
            img.addEventListener('error', () => { if (++loaded === imgs.length) layoutMasonry(); }, { once: true });
        });
    }

    // Debounced resize
    let _resizeTimer = null;
    window.addEventListener('resize', () => {
        clearTimeout(_resizeTimer);
        _resizeTimer = setTimeout(layoutMasonry, 120);
    });

    function buildCard(post) {
        const card = document.createElement('div');
        card.className = 'photo-card';
        const mediumHTML = post.medium ? `<div class="overlay-medium">${post.medium}</div>` : '';
        const toolsHTML  = post.tools  ? `<div class="overlay-tools">Tools: ${post.tools}</div>` : '';
        card.innerHTML = `<img class="photo-img" src="${post.image_url}" alt="${post.title || ''}" loading="lazy"><div class="photo-overlay"><div class="overlay-title">${post.title || ''}</div>${mediumHTML}${toolsHTML}</div>${isAdmin ? `<button class="photo-del-btn" onclick="deletePost(event,'${post.id}','${post.image_url}')">✕</button>` : ''}`;
        card.addEventListener('touchstart', () => {
            document.querySelectorAll('.photo-card.touch-active').forEach(c => { if (c !== card) c.classList.remove('touch-active'); });
            card.classList.toggle('touch-active');
        }, { passive: true });
        return card;
    }

    function renderGrid() {
        const grid = document.getElementById('gallery-grid');
        grid.innerHTML = '';
        grid.style.height = '';
        const filtered = currentCategory === 'All' ? posts : posts.filter(p => p.category === currentCategory);
        if (!filtered.length) {
            grid.style.position = 'relative';
            grid.innerHTML = `<div class="gallery-empty" style="position:relative;"><h2>${posts.length === 0 ? 'No posts yet' : 'Nothing here yet'}</h2><p>${posts.length === 0 ? 'Check back soon for new work.' : 'No posts in this category yet.'}</p></div>`;
            return;
        }
        const cards = filtered.map(buildCard);
        cards.forEach(c => grid.appendChild(c));
        layoutAfterImages(cards);
    }

    async function deletePost(event,postId,imageUrl){event.stopPropagation();if(!confirm('Delete this post?'))return;const{error}=await sb.from('gallery_posts').delete().eq('id',postId);if(error){notify('Delete failed: '+error.message,'❌');return;}try{const ps=imageUrl.indexOf(`/${BUCKET}/`)+`/${BUCKET}/`.length;await sb.storage.from(BUCKET).remove([imageUrl.substring(ps)]);}catch(e){}posts=posts.filter(p=>String(p.id)!==String(postId));buildCategoryNav(posts);renderGrid();notify('Post deleted.','🗑️');}

    (function(){if(window.innerWidth<768)return;const hdr=document.querySelector('header');let lastY=0,ticking=false;function onScroll(){if(!ticking){window.requestAnimationFrame(()=>{const y=window.scrollY;if(y>60&&y>lastY)hdr.classList.add('headroom--hidden');else hdr.classList.remove('headroom--hidden');lastY=y<=0?0:y;ticking=false;});ticking=true;}}window.addEventListener('scroll',onScroll,{passive:true});})();

    async function init(){try{const{data}=await sb.from('front_page_settings').select('logo_url').eq('id',1).single();if(data&&data.logo_url){const img=document.getElementById('nav-logo-img'),txt=document.getElementById('nav-logo-text');img.src=data.logo_url;img.classList.remove('hidden');if(txt)txt.style.display='none';}}catch(e){}const{data,error}=await sb.from('gallery_posts').select('*').order('created_at',{ascending:false});const loader=document.getElementById('gallery-loading');if(loader)loader.remove();if(error){document.getElementById('gallery-grid').innerHTML='<div class="gallery-empty"><p>Could not load gallery.</p></div>';return;}posts=data||[];buildCategoryNav(posts);renderGrid();}
    init();
</script>
<!-- ============================================================
     FLOATING NAV — mobile-only draggable launcher
     Drop this block right before </body> on every page.
     Edit FNAV_CONFIG to customise icon src & page links.
============================================================ -->

<!-- inject into <head> or keep inline — purely CSS, no deps -->
<style>
/* ── FLOATING NAV ─────────────────────────────────────── */
#fnav-wrap{
    display:none;   /* hidden on desktop */
    position:fixed;
    z-index:10000;
    touch-action:none;
    user-select:none;
    -webkit-user-select:none;
}
@media(max-width:767px){
    #fnav-wrap{ display:block; }
}

/* Main trigger button */
#fnav-trigger{
    width:58px;height:58px;
    border-radius:50%;
    background:transparent;
    border:none;
    box-shadow:none;
    display:flex;align-items:center;justify-content:center;
    cursor:pointer;
    opacity:0.52;
    transition:opacity 0.25s ease,
               transform  0.18s cubic-bezier(0.34,1.56,0.64,1);
    position:relative;
    z-index:2;
    will-change:transform;
}
#fnav-trigger.active,
#fnav-trigger:active{
    opacity:1;
    transform:scale(1.1);
}
#fnav-trigger img{
    width:58px;height:58px;
    object-fit:contain;
    border-radius:0;
    pointer-events:none;
    display:block;
}
/* Subtle drop-shadow pulse — works on any transparent icon */
#fnav-trigger::after{
    content:'';
    position:absolute;inset:0;
    border-radius:50%;
    background:transparent;
    box-shadow:0 0 0 0 rgba(0,255,102,0.5);
    animation:fnav-pulse 3s ease-in-out infinite;
    pointer-events:none;
}
@keyframes fnav-pulse{
    0%,100%{box-shadow:0 0 0 0 rgba(0,255,102,0.45);}
    50%{box-shadow:0 0 0 10px rgba(0,255,102,0);}
}

/* Sub-buttons container */
#fnav-buttons{
    position:absolute;
    top:50%;left:50%;
    transform:translate(-50%,-50%);
    pointer-events:none;
}
/* Individual sub-button */
.fnav-btn{
    position:absolute;
    width:52px;height:52px;
    border-radius:50%;
    background:#ffffff;
    border:2.5px solid #000000;
    box-shadow:none;
    display:flex;flex-direction:column;
    align-items:center;justify-content:center;
    gap:2px;
    text-decoration:none;
    color:#000000;
    font-family:'Unbounded',sans-serif;
    font-size:0.36rem;
    font-weight:900;
    text-transform:uppercase;
    letter-spacing:0.3px;
    cursor:pointer;
    opacity:0;
    pointer-events:none;
    transform:translate(-50%,-50%) scale(0.4);
    transition:
        transform 0.42s cubic-bezier(0.34,1.56,0.64,1),
        opacity   0.32s ease,
        background 0.18s ease,
        box-shadow 0.18s ease;
    will-change:transform,opacity;
    -webkit-tap-highlight-color:transparent;
}
.fnav-btn svg{
    width:18px;height:18px;
    flex-shrink:0;
    pointer-events:none;
    transition:transform 0.2s ease;
}
/* Staggered delays so buttons cascade out */
.fnav-btn:nth-child(1){ transition-delay:0s,    0s,    0s, 0s; }
.fnav-btn:nth-child(2){ transition-delay:0.06s, 0.06s, 0s, 0s; }
.fnav-btn:nth-child(3){ transition-delay:0.12s, 0.12s, 0s, 0s; }

/* Open state */
#fnav-wrap.open .fnav-btn{
    opacity:1;
    pointer-events:auto;
}
/* Hover / active */
.fnav-btn:hover,.fnav-btn:active{
    background:#00ff66;
    box-shadow:none;
    transform:translate(-50%,-50%) scale(1.12) !important;
}

/* Active-page indicator dot */
.fnav-btn.current-page{
    background:#00ff66;
    border-color:#000;
}

/* Backdrop dim when open */
#fnav-backdrop{
    display:none;
    position:fixed;inset:0;
    z-index:9999;
    background:rgba(0,0,0,0);
    transition:background 0.3s ease;
}
#fnav-wrap.open ~ #fnav-backdrop,
#fnav-backdrop.visible{
    display:block;
    background:rgba(0,0,0,0.28);
}
/* ── END FLOATING NAV CSS ─────────────────────────────── */
</style>

<!-- Backdrop (sibling of wrap so z-index layering works) -->
<div id="fnav-backdrop"></div>

<!-- The widget itself -->
<div id="fnav-wrap">
    <div id="fnav-trigger" aria-label="Navigation menu" role="button" tabindex="0">
        <img id="fnav-icon-img" src="" alt="Nav">
        <!-- Fallback SVG shown when no custom icon is set -->
        <svg id="fnav-icon-svg" viewBox="0 0 24 24" fill="none" stroke="#00ff66" stroke-width="2.2" stroke-linecap="round">
            <line x1="3" y1="6"  x2="21" y2="6"/>
            <line x1="3" y1="12" x2="21" y2="12"/>
            <line x1="3" y1="18" x2="21" y2="18"/>
        </svg>
    </div>
    <div id="fnav-buttons">
        <!-- populated by JS from config -->
    </div>
</div>

<script>
(function(){
'use strict';

/* ═══════════════════════════════════════════════════════════════
   CONFIG — edit these to customise the floating nav
   iconSrc : URL to the main trigger image (leave '' for default SVG)
   pages   : the 3 nav destinations
   activePage : set to the filename of the current page (auto-detected below)
═══════════════════════════════════════════════════════════════ */
const FNAV_CONFIG = {
    iconSrc : '',           // e.g. 'https://…/icon.png'  — set from admin panel
    pages: [
        {
            label : 'Home',
            href  : 'index.html',
            svg   : '<svg viewBox="0 0 24 24" fill="currentColor"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg>'
        },
        {
            label : 'Gallery',
            href  : 'gallery.html',
            svg   : '<svg viewBox="0 0 24 24" fill="currentColor"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>'
        },
        {
            label : 'Shop',
            href  : 'main-shop.html',
            svg   : '<svg viewBox="0 0 24 24" fill="currentColor"><path d="M6 2L3 6v14a2 2 0 002 2h14a2 2 0 002-2V6l-3-4zM3 6h18M16 10a4 4 0 01-8 0" stroke="currentColor" stroke-width="1.5" fill="none" stroke-linecap="round"/></svg>'
        }
    ]
};

/* ── Auto-detect current page for active highlight ── */
const currentFile = window.location.pathname.split('/').pop() || 'index.html';

/* ── Storage key for persisted position ── */
const STORE_KEY = 'fnav_pos_v2';

/* ── Constants ── */
const EDGE_MARGIN   = 10;   // px from screen edge when snapped
const TOP_DEADZONE  = 90;   // px from top  (avoids browser bar)
const BOT_DEADZONE  = 90;   // px from bottom (avoids home gesture)
const BTN_RADIUS    = 72;   // px  — arc radius for sub-buttons
const DRAG_THRESHOLD = 6;   // px movement before we treat it as drag

/* ── Elements ── */
const wrap      = document.getElementById('fnav-wrap');
const trigger   = document.getElementById('fnav-trigger');
const btnWrap   = document.getElementById('fnav-buttons');
const backdrop  = document.getElementById('fnav-backdrop');
const iconImg   = document.getElementById('fnav-icon-img');
const iconSvg   = document.getElementById('fnav-icon-svg');

/* ── Apply icon: config override first, then Supabase, then default SVG ── */
function applyFnavIcon(src) {
    if (src) {
        iconImg.src = src;
        iconImg.style.display = 'block';
        iconSvg.style.display = 'none';
    } else {
        iconImg.style.display = 'none';
        iconSvg.style.display = 'block';
        iconSvg.style.width  = '42px';
        iconSvg.style.height = '42px';
    }
}

// Apply immediately from config (may be empty)
applyFnavIcon(FNAV_CONFIG.iconSrc);

// Then try to fetch from Supabase front_page_settings
(async function loadFnavIcon() {
    try {
        const cached = localStorage.getItem('fnav_icon_url');
        if (cached) { applyFnavIcon(cached); FNAV_CONFIG.iconSrc = cached; }
        const { data: _fpd } = await sb.from('front_page_settings').select('fnav_icon_url').eq('id',1).single();
        if (_fpd && _fpd.fnav_icon_url) {
            applyFnavIcon(_fpd.fnav_icon_url);
            FNAV_CONFIG.iconSrc = _fpd.fnav_icon_url;
            localStorage.setItem('fnav_icon_url', _fpd.fnav_icon_url);
        }
    } catch(e) {}
})();

/* ── Build sub-buttons ── */
FNAV_CONFIG.pages.forEach(page => {
    const a = document.createElement('a');
    a.className = 'fnav-btn' + (page.href === currentFile ? ' current-page' : '');
    a.href  = page.href;
    a.setAttribute('aria-label', page.label);
    a.innerHTML = page.svg +
        `<span style="font-family:'Unbounded',sans-serif;font-size:0.33rem;font-weight:900;
         text-transform:uppercase;letter-spacing:0.4px;line-height:1;margin-top:1px;
         pointer-events:none;">${page.label}</span>`;
    btnWrap.appendChild(a);
});

/* ── Position state ── */
let posX, posY;
let isOpen   = false;
let isDragging = false;
let onRight  = true;  // which edge the icon is snapped to

function clampY(y) {
    const h = window.innerHeight;
    const half = 29; // ~half trigger height
    return Math.max(TOP_DEADZONE + half, Math.min(h - BOT_DEADZONE - half, y));
}

function applyPos(x, y, animate) {
    wrap.style.transition = animate
        ? 'left 0.38s cubic-bezier(0.34,1.56,0.64,1), top 0.38s cubic-bezier(0.34,1.56,0.64,1)'
        : 'none';
    wrap.style.left = x + 'px';
    wrap.style.top  = y + 'px';
}

function snapToEdge(animate) {
    const w    = window.innerWidth;
    const half = 29;
    const midX = posX + half;
    onRight = midX > w / 2;
    posX = onRight ? w - EDGE_MARGIN - 58 : EDGE_MARGIN;
    posY = clampY(posY);
    applyPos(posX, posY, animate);
    savePos();
    positionButtons();
}

function savePos() {
    try { localStorage.setItem(STORE_KEY, JSON.stringify({ x: posX, y: posY, right: onRight })); }
    catch(e) {}
}

function loadPos() {
    try {
        const raw = localStorage.getItem(STORE_KEY);
        if (raw) {
            const d = JSON.parse(raw);
            posX   = d.x;
            posY   = clampY(d.y);
            onRight = d.right !== false;
            applyPos(posX, posY, false);
            positionButtons();
            return;
        }
    } catch(e) {}
    // Default: right edge, 40% down
    posX   = window.innerWidth - EDGE_MARGIN - 58;
    posY   = clampY(window.innerHeight * 0.42);
    onRight = true;
    applyPos(posX, posY, false);
    positionButtons();
}

/* ── Fan-out positions for sub-buttons ── */
function positionButtons() {
    const btns = btnWrap.querySelectorAll('.fnav-btn');
    const count = btns.length;
    // Angles: fan toward center of screen
    // Right edge → fan left  (angles: 150°, 180°, 210° from right)
    // Left edge  → fan right (angles:  30°,   0°, -30°)
    const baseAngles = onRight
        ? [225, 180, 135]   // top-left, left, bottom-left
        : [-45,   0,  45];  // top-right, right, bottom-right

    btns.forEach((btn, i) => {
        const rad = (baseAngles[i] * Math.PI) / 180;
        const bx  = Math.cos(rad) * BTN_RADIUS;
        const by  = Math.sin(rad) * BTN_RADIUS;
        // transform-origin is center of trigger (50%,50% of #fnav-buttons which is centered)
        if (isOpen) {
            btn.style.transform = `translate(calc(-50% + ${bx}px), calc(-50% + ${by}px)) scale(1)`;
        } else {
            btn.style.transform = `translate(-50%, -50%) scale(0.4)`;
        }
    });
}

/* ── Open / close ── */
function openMenu() {
    isOpen = true;
    wrap.classList.add('open');
    trigger.classList.add('active');
    backdrop.classList.add('visible');
    positionButtons();
}

function closeMenu() {
    isOpen = false;
    wrap.classList.remove('open');
    trigger.classList.remove('active');
    backdrop.classList.remove('visible');
    positionButtons();
}

function toggleMenu() {
    isOpen ? closeMenu() : openMenu();
}

/* ── Drag logic ── */
let dragStartX = 0, dragStartY = 0;
let dragOriginX = 0, dragOriginY = 0;
let hasMoved = false;

trigger.addEventListener('touchstart', e => {
    const t = e.touches[0];
    dragStartX  = t.clientX;
    dragStartY  = t.clientY;
    dragOriginX = posX;
    dragOriginY = posY;
    hasMoved    = false;
    isDragging  = false;
    trigger.classList.add('active');
    wrap.style.transition = 'none';
    // pause pulse
    trigger.style.setProperty('--fnav-pulse-play', 'paused');
    e.stopPropagation();
}, { passive: true });

trigger.addEventListener('touchmove', e => {
    const t = e.touches[0];
    const dx = t.clientX - dragStartX;
    const dy = t.clientY - dragStartY;

    if (!isDragging && (Math.abs(dx) > DRAG_THRESHOLD || Math.abs(dy) > DRAG_THRESHOLD)) {
        isDragging = true;
        if (isOpen) closeMenu();
    }
    if (!isDragging) return;

    hasMoved = true;
    posX = dragOriginX + dx;
    posY = clampY(dragOriginY + dy);
    applyPos(posX, posY, false);
    positionButtons();
    e.preventDefault();
}, { passive: false });

trigger.addEventListener('touchend', e => {
    trigger.classList.remove('active');
    trigger.style.removeProperty('--fnav-pulse-play');

    if (isDragging) {
        snapToEdge(true);
        isDragging = false;
        hasMoved   = false;
        // block the tap-to-open that would fire on touchend after drag
        e.preventDefault();
    } else {
        toggleMenu();
    }
}, { passive: false });

/* ── Keyboard accessibility ── */
trigger.addEventListener('keydown', e => {
    if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); toggleMenu(); }
});

/* ── Close on backdrop tap ── */
backdrop.addEventListener('click', closeMenu);
backdrop.addEventListener('touchend', e => { e.preventDefault(); closeMenu(); }, { passive: false });

/* ── Close when a sub-button is tapped ── */
btnWrap.querySelectorAll('.fnav-btn').forEach(btn => {
    btn.addEventListener('touchend', () => { setTimeout(closeMenu, 80); }, { passive: true });
});

/* ── Re-snap on orientation / resize ── */
window.addEventListener('resize', () => {
    posY = clampY(posY);
    snapToEdge(false);
});

/* ── Init ── */
loadPos();

/* ── Expose update hook for admin panel integration ── */
window.fnavSetIcon = function(src) {
    FNAV_CONFIG.iconSrc = src;
    applyFnavIcon(src);
    // Persist so all other pages pick it up from cache
    try {
        if (src) localStorage.setItem('fnav_icon_url', src);
        else localStorage.removeItem('fnav_icon_url');
    } catch(e) {}
};

})();
</script>
<!-- ============ END FLOATING NAV ============ -->

</body>
</html>
